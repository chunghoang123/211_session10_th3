spring.application.name=th3


spring.datasource.url=jdbc:mysql://localhost:3306/th3_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=Londeocan1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE


server.port=8080

logging.file.name=logs/app.log


logging.level.root=INFO
logging.level.org.example.th3=INFO


logging.logback.rollingpolicy.max-file-size=10MB

logging.logback.rollingpolicy.file-name-pattern=logs/app-%d{yyyy-MM-dd}.%i.log.gz

logging.logback.rollingpolicy.max-history=30

logging.logback.rollingpolicy.total-size-cap=1GB

logging.logback.rollingpolicy.clean-history-on-start=true